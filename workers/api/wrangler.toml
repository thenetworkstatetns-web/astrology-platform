name = "astro-platform-api"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

# ---------------------------------------------------------------------------
# D1 Database binding
# ---------------------------------------------------------------------------
[[d1_databases]]
binding = "DB"
database_name = "astro-platform-db"
database_id = "REPLACE_WITH_D1_DATABASE_ID"
migrations_dir = "migrations"

# ---------------------------------------------------------------------------
# R2 Storage binding — configured only, not used in Task 1.
# ---------------------------------------------------------------------------
[[r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "astro-platform-media"

# ---------------------------------------------------------------------------
# Environment variables (non-secret). Secrets (JWT_SECRET) must be set via:
#   wrangler secret put JWT_SECRET
# ---------------------------------------------------------------------------
[vars]
ENVIRONMENT = "development"
ALLOWED_ORIGINS = "http://localhost:3000,http://localhost:3001"

[env.production]
name = "astro-platform-api-production"

[env.production.vars]
ENVIRONMENT = "production"
ALLOWED_ORIGINS = "https://example.com,https://admin.example.com"

[[env.production.d1_databases]]
binding = "DB"
database_name = "astro-platform-db"
database_id = "REPLACE_WITH_D1_DATABASE_ID"
migrations_dir = "migrations"

[[env.production.r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "astro-platform-media"
